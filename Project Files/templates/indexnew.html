<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;

    /* BACKGROUND IMAGE */
    background: url("{{ url_for('static', filename='background.jpg') }}") no-repeat center center fixed;
    background-size: cover;

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* MAIN CONTAINER (GLASS + BLACK STYLE) */
.container{
    width:100%;
    max-width:520px;

    background:rgba(0,0,0,0.75);
    color:white;

    backdrop-filter:blur(8px);
    padding:40px;
    border-radius:18px;

    box-shadow:0 12px 40px rgba(0,0,0,.6);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    color:#ff4d4d;   /* red title */
    font-size:30px;
    margin-bottom:10px;
}

.header p{
    color:#ddd;
    font-size:14px;
}

/* INFO BOX */
.info-box{
    background:rgba(255,255,255,0.1);
    color:#ddd;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:16px;
}

label{
    font-weight:bold;
    margin-bottom:6px;
    color:#fff;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

/* focus effect */
input:focus{
    box-shadow:0 0 8px #7b2ff7;
}

/* hint */
.hint{
    font-size:12px;
    color:#bbb;
    margin-top:4px;
}

/* BUTTONS */
.button-group{
    display:flex;
    gap:12px;
    margin-top:10px;
}

input[type=submit]{
    flex:1;
    border:none;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
    color:white;
    background:linear-gradient(90deg,#7b2ff7,#f107a3);
    transition:0.3s;
}

input[type=submit]:hover{
    transform:scale(1.05);
}

.btn-home{
    flex:1;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    color:white;
    background:#444;
    font-size:17px;
    transition:0.3s;
}

.btn-home:hover{
    background:#222;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>🌍 HDI Prediction</h1>
        <p>Enter country development indicators</p>
    </div>

    <div class="info-box">
        ℹ️ Please enter correct values to get accurate prediction.
    </div>

    <form action="/predict" method="POST">

        <label>Life Expectancy at Birth</label>
        <input type="number" name="life" placeholder="72.5" step="0.1">

        <label>Expected Years of Schooling</label>
        <input type="number" name="expected" placeholder="14.4" step="0.1">

        <label>Mean Years of Schooling</label>
        <input type="number" name="mean" placeholder="5.2" step="0.1">

        <label>GNI Per Capita</label>
        <input type="number" name="gni" placeholder="3341">

        <div class="button-group">
            <input type="submit" value="🔮 Predict HDI">
            <a href="/Home" class="btn-home">🏠 Home</a>
        </div>

    </form>

</div>

</body>
</html>
