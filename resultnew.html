<!DOCTYPE html>
<html>
<head>
    <title>HDI Result</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;

    /* BACKGROUND */
    background: url("{{ url_for('static', filename='background.jpg') }}") no-repeat center center fixed;
    background-size: cover;

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.60);
    z-index:-1;
}

/* BLACK RESULT BOX */
.result-box{
    width:100%;
    max-width:500px;

    background:rgba(0,0,0,0.80);
    color:white;

    padding:40px;
    border-radius:18px;

    box-shadow:0 12px 40px rgba(0,0,0,0.7);

    text-align:center;
}

/* TITLE */
.result-box h2{
    font-size:30px;
    color:#00ffcc;
    margin-bottom:15px;
}

/* SCORE */
.result-box h3{
    font-size:22px;
    color:#ffffff;
    margin-top:10px;
}

/* ERROR */
.error{
    color:#ff4d4d;
    font-weight:bold;
}

/* BUTTON */
a{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:linear-gradient(90deg,#7b2ff7,#f107a3);
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

a:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="result-box">

    {% if is_error %}
        <h2 class="error">❌ Error Occurred</h2>
        <p>{{ prediction_text }}</p>
    {% else %}
        {{ prediction_text|safe }}
    {% endif %}

    <a href="/Prediction">🔙 Back</a>

</div>

</body>
</html>
